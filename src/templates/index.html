<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Deforestation Alert System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #388e3c; /* A strong forest green */
            --secondary-color: #cddc39; /* A bright, leafy green */
            --background-start: #1b5e20; /* Darker forest green */
            --background-end: #004d40;   /* A dark teal-green */
            --card-background: rgba(45, 45, 45, 0.8);
            --text-color: #e0e0e0;
            --header-color: #fff;
            --shadow-light: 0 8px 24px rgba(0, 0, 0, 0.4);
            --button-shadow: 0 4px 15px rgba(56, 142, 60, 0.5);
            --alert-color: #d32f2f; /* Red for the alert status */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--background-start) 0%, var(--background-end) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            background: var(--card-background);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: var(--header-color);
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 1.1em;
            color: var(--text-color);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group label {
            font-weight: 400;
            font-size: 1em;
        }

        .input-group input {
            padding: 10px 15px;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            width: 150px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-color);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(56, 142, 60, 0.6);
        }

        #alert-button {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            font-weight: 700;
            box-shadow: var(--button-shadow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #alert-button:hover {
            background-color: #2e7d32;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(56, 142, 60, 0.7);
        }

        #alert-button:disabled {
            background-color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-spinner {
            display: none;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid var(--secondary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 25px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status-message {
            font-size: 1.2em;
            font-weight: 700;
            margin-top: 20px;
        }
        
        #status-message.deforestation {
            color: var(--alert-color); /* The red color for deforestation alerts */
        }
        
        #status-message.success {
            color: var(--secondary-color); /* Green for success or no deforestation */
        }

        .results-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .result-image {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            flex: 1 1 45%;
            max-width: 45%;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .result-image:hover {
            transform: translateY(-5px);
        }

        .result-image h3 {
            margin-top: 0;
            color: var(--header-color);
        }

        .result-image img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 20px;
            }
            .input-group {
                flex-direction: column;
                gap: 15px;
            }
            .result-image {
                flex: 1 1 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Satellite Deforestation Alert System</h1>
        <p>Enter the latitude and longitude of an area to analyze.</p>
        <div class="input-group">
            <label for="lat">Latitude:</label>
            <input type="number" id="lat" value="-15.01" step="any">
            <label for="lon">Longitude:</label>
            <input type="number" id="lon" value="-62.99" step="any">
        </div>
        <button id="alert-button">Detect Deforestation</button>
        <div id="loading" class="loading-spinner"></div>
        <div id="status-message"></div>
        <div class="results-container" id="results"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
        // Use Anime.js to animate the page on load
        document.addEventListener('DOMContentLoaded', () => {
            anime({
                targets: '.container',
                translateY: 0,
                opacity: 1,
                duration: 800,
                easing: 'easeInOutQuad'
            });

            anime({
                targets: 'h1, p',
                opacity: [0, 1],
                translateY: [20, 0],
                delay: anime.stagger(100, { start: 500 }),
                easing: 'easeInOutQuad'
            });

            anime({
                targets: '#alert-button',
                scale: [0.8, 1],
                opacity: [0, 1],
                duration: 600,
                delay: 1000,
                easing: 'easeOutQuad'
            });
        });

        // Event listener for the button click
        document.getElementById('alert-button').addEventListener('click', () => {
            const button = document.getElementById('alert-button');
            const loading = document.getElementById('loading');
            const statusMessage = document.getElementById('status-message');
            const resultsContainer = document.getElementById('results');
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;

            // Show loading state
            button.disabled = true;
            button.innerText = 'Detecting...';
            loading.style.display = 'block';
            statusMessage.innerText = 'Downloading and processing the satellite image...';
            statusMessage.className = '';
            resultsContainer.innerHTML = '';
            
            // Animate the button click
            anime({
                targets: button,
                scale: 0.95,
                duration: 150,
                easing: 'easeOutQuad',
                direction: 'alternate',
            });

            // Make the API call to the Flask backend with lat/lon parameters
            fetch(`/detect?lat=${lat}&lon=${lon}`)
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error || 'Server error'); });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        const deforestationPercentage = parseFloat(data.percentage);
                        statusMessage.innerText = `Deforestation detected: ${deforestationPercentage.toFixed(2)}%`;
                        
                        if (deforestationPercentage > 1) {
                            statusMessage.classList.add('deforestation');
                        } else {
                            statusMessage.classList.add('success');
                        }

                        // Animate in the results
                        resultsContainer.innerHTML = '';
                        const blendedImage = document.createElement('div');
                        blendedImage.classList.add('result-image');
                        blendedImage.innerHTML = `<h3>Deforestation Overlay</h3><img src="${data.blended_image_url}" alt="Blended Image">`;
                        
                        const maskImage = document.createElement('div');
                        maskImage.classList.add('result-image');
                        maskImage.innerHTML = `<h3>Predicted Mask</h3><img src="${data.mask_image_url}" alt="Prediction Mask">`;

                        resultsContainer.appendChild(blendedImage);
                        resultsContainer.appendChild(maskImage);

                        anime({
                            targets: '.result-image',
                            translateY: [20, 0],
                            opacity: [0, 1],
                            duration: 800,
                            delay: anime.stagger(200),
                            easing: 'easeOutQuad'
                        });

                    } else {
                        statusMessage.innerText = `Error: ${data.error}`;
                        statusMessage.classList.add('deforestation');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    statusMessage.innerText = `An error occurred: ${error.message}`;
                    statusMessage.classList.add('deforestation');
                })
                .finally(() => {
                    // Revert button state
                    button.disabled = false;
                    button.innerText = 'Detect Deforestation';
                    loading.style.display = 'none';
                });
        });
    </script>
</body>
</html>
