<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Deforestation Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-4xl w-full flex flex-col md:flex-row gap-8">
        <!-- Input Form and Controls -->
        <div class="w-full md:w-1/3 flex flex-col space-y-6">
            <h1 class="text-3xl font-extrabold text-gray-900 text-center">Historical Deforestation</h1>
            <p class="text-gray-600 text-center">
                Enter a location and a date range to check for deforestation.
            </p>

            <div class="space-y-4">
                <div>
                    <label for="lat" class="block text-sm font-medium text-gray-700">Latitude</label>
                    <input type="number" id="lat" placeholder="-15.01" value="-15.01" step="0.0001"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <div>
                    <label for="lon" class="block text-sm font-medium text-gray-700">Longitude</label>
                    <input type="number" id="lon" placeholder="-62.99" value="-62.99" step="0.0001"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <div>
                    <label for="start_date" class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" id="start_date" value="2024-01-01"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
                <div>
                    <label for="end_date" class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" id="end_date" value="2024-06-01"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" />
                </div>
            </div>

            <button onclick="detectDeforestation()"
                    class="w-full py-3 px-6 bg-blue-600 text-white rounded-full font-semibold shadow-md hover:bg-blue-700 transition duration-300">
                Analyze Deforestation
            </button>
        </div>

        <!-- Results Display Area -->
        <div class="w-full md:w-2/3 flex flex-col items-center">
            <div id="results-container" class="w-full">
                <div id="loading" class="hidden text-center text-gray-500 text-lg">
                    Analyzing satellite data. This may take a moment...
                </div>
                <div id="error" class="hidden text-center text-red-500 font-semibold text-lg"></div>
                <div id="images-display" class="hidden flex flex-col space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800 text-center">Results</h2>
                    <p id="percentage" class="text-xl text-center font-bold text-blue-600"></p>
                    
                    <div class="bg-gray-200 rounded-lg p-2 shadow-inner">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">Satellite View with Deforestation Overlay</h3>
                        <img id="blended-image" src="" alt="Blended satellite image" class="w-full h-auto rounded-lg shadow-md" />
                    </div>

                    <div class="bg-gray-200 rounded-lg p-2 shadow-inner">
                        <h3 class="text-lg font-medium text-gray-700 mb-2">Deforestation Mask (New Areas)</h3>
                        <img id="mask-image" src="" alt="Deforestation mask" class="w-full h-auto rounded-lg shadow-md" />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function detectDeforestation() {
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const imagesDisplay = document.getElementById('images-display');
            const percentageText = document.getElementById('percentage');
            const blendedImage = document.getElementById('blended-image');
            const maskImage = document.getElementById('mask-image');

            // Reset UI
            loading.classList.remove('hidden');
            imagesDisplay.classList.add('hidden');
            error.classList.add('hidden');
            error.textContent = '';
            
            try {
                const response = await fetch(`/detect?lat=${lat}&lon=${lon}&start_date=${startDate}&end_date=${endDate}`);
                const data = await response.json();

                if (response.ok && data.success) {
                    percentageText.textContent = `New Deforestation Detected: ${data.percentage}`;
                    blendedImage.src = data.blended_image_url;
                    maskImage.src = data.mask_image_url;
                    imagesDisplay.classList.remove('hidden');
                } else {
                    error.textContent = `Error: ${data.error || 'An unknown error occurred.'}`;
                    error.classList.remove('hidden');
                }
            } catch (e) {
                error.textContent = `Network Error: Could not connect to the server. Please check your connection.`;
                error.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
